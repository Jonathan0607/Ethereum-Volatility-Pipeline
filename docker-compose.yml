services:
  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./best_params.txt:/app/best_params.txt
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: ../frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  stream_engine:
    build:
      context: .
      dockerfile: stream.Dockerfile
    volumes:
      - ./best_params.txt:/app/best_params.txt
    depends_on:
      - api
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: backend.Dockerfile
    command: python scheduler.py
    volumes:
      - ./data:/app/data
      - ./best_params.txt:/app/best_params.txt
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    restart: unless-stopped